<!DOCTYPE html>
<html>
<head>
<title>Encrypt Image</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-image: url('static/encrypt.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        text-shadow: 1px 1px 5px black;
    }

    .glass-box {
        background: rgba(0,0,0,0.55);
        padding: 40px;
        border-radius: 20px;
        margin-top: 50px;
    }

    h2 {
        text-align: center;
        font-size: 36px;
        font-weight: bold;
        margin-bottom: 30px;
    }

    .btn-adv {
        padding: 14px 30px;
        font-size: 20px;
        border-radius: 50px;
        font-weight: bold;
        text-decoration: none;
        display: inline-block;
        box-shadow: 0px 6px 15px rgba(0,0,0,0.5);
        transition: 0.3s;
        margin-top: 20px;
        margin-right: 10px;
    }

    .btn-adv:hover {
        transform: scale(1.08);
    }

    .btn-encrypt {
        background-color: #00eaff;
        color: black;
    }

    .btn-return {
        background-color: #ff66c4;
        color: white;
    }

    label {
        font-size: 20px;
        font-weight: bold;
    }

</style>

</head>
<body>

<div class="container">

<div class="glass-box">

<h2>🔐 Encrypt Image</h2>

{% with messages = get_flashed_messages() %}
  {% if messages %}
  <div class="alert alert-danger">
    {% for msg in messages %} ⚠️ {{ msg }} <br> {% endfor %}
  </div>
  {% endif %}
{% endwith %}

<form method="POST" enctype="multipart/form-data">

  <label class="form-label">🖼️ Select Image</label>
  <input type="file" name="image" class="form-control" required>
  <label class="form-label mt-4">🔑 UserName</label>
  <input type="text" name="username" class="form-control" required>
  <label class="form-label mt-4">🔑 Enter Password</label>
  <input type="password" name="password" class="form-control" required>
  

  <br>

  <button class="btn-adv btn-encrypt">✨ Encrypt</button>
  <a href="{{ url_for('detect') }}" class="btn-adv btn-return">🔙 Return</a>

</form>

</div>

</div>

</body>
</html>
