<!DOCTYPE html>
<html>
<head>
<title>Detect</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-image: url('static/detect.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        text-shadow: 1px 1px 5px black;
    }

    .glass-box {
        background: rgba(0, 0, 0, 0.55);
        padding: 50px;
        border-radius: 18px;
        margin-top: 80px;
        display: inline-block;
    }

    h2 {
        font-size: 38px;
        font-weight: bold;
        margin-bottom: 25px;
    }

    .btn-advanced {
        padding: 15px 35px;
        font-size: 22px;
        border-radius: 50px;
        font-weight: bold;
        display: inline-block;
        margin: 10px;
        box-shadow: 0px 6px 14px rgba(0,0,0,0.5);
        transition: 0.3s;
        text-decoration: none;
    }

    .btn-advanced:hover {
        transform: scale(1.10);
    }

    .btn-encrypt {
        background: #00eaff;
        color: black;
    }

    .btn-decrypt {
        background: #ffcc00;
        color: black;
    }

    .btn-return {
        background: #ff66c4;
        color: white;
    }

</style>
</head>

<body class="text-center">

<div class="glass-box">

    <h2>🛰️ Select Operation</h2>

    <a href="{{ url_for('encrypt_page') }}" class="btn-advanced btn-encrypt">
        🔐 Encryption
    </a>

    <a href="{{ url_for('decrypt_page') }}" class="btn-advanced btn-decrypt">
        🔎 Decryption
    </a>

    <br>

    <a href="{{ url_for('index') }}" class="btn-advanced btn-return">
        🔙 Return Home
    </a>

</div>

</body>
</html>
