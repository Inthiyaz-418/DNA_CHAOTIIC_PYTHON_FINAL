<!DOCTYPE html>
<html>
<head>
<title>Encryption Result</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body {
        background-image: url('static/encrypt_result.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        text-shadow: 1px 1px 4px black;
    }

    .glass-box {
        background: rgba(0,0,0,0.55);
        padding: 40px;
        border-radius: 20px;
        margin-top: 50px;
    }

    h2 {
        font-size: 36px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
    }

    h4 {
        font-size: 28px;
        margin-top: 30px;
        margin-bottom: 15px;
        text-shadow: 1px 1px 3px black;
    }

    img {
        max-width: 100%;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        margin-bottom: 15px;
    }

    .btn-adv {
        padding: 14px 30px;
        font-size: 20px;
        border-radius: 50px;
        font-weight: bold;
        box-shadow: 0px 6px 15px rgba(0,0,0,0.5);
        transition: 0.3s;
        text-decoration: none;
        margin-top: 20px;
    }

    .btn-adv:hover {
        transform: scale(1.08);
    }

    .btn-return {
        background-color: #ff66c4;
        color: white;
    }

</style>

</head>

<body>
<div class="container">

<div class="glass-box">

    <h2>🔐 Encryption Result</h2>

    <h4>🖼️ Input Image</h4>
    <img src="{{ url_for('uploaded', filename=input_image) }}" alt="Input Image">

    <h4>🔒 Encrypted Image</h4>
    <img src="{{ url_for('uploaded', filename=encrypted_image) }}" alt="Encrypted Image">

    <div class="text-center">
        <a href="{{ url_for('detect') }}" class="btn-adv btn-return">
            🔙 Return to Detect
        </a>
    </div>

</div>

</div>
</body>
</html>
