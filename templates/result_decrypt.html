<!DOCTYPE html>
<html>
<head>
<title>Decryption Result</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body {
        background-image: url('static/decrypt.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        text-shadow: 1px 1px 5px black;
    }

    .glass-box {
        background: rgba(0,0,0,0.55);
        padding: 40px;
        border-radius: 20px;
        margin-top: 60px;
    }

    h2 {
        font-size: 36px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
    }

    img {
        max-width: 100%;
        border-radius: 18px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        margin-top: 15px;
    }

    .btn-adv {
        padding: 14px 30px;
        font-size: 20px;
        border-radius: 50px;
        font-weight: bold;
        text-decoration: none;
        display: inline-block;
        box-shadow: 0px 6px 18px rgba(0,0,0,0.5);
        transition: 0.3s;
        margin-top: 25px;
    }

    .btn-adv:hover {
        transform: scale(1.08);
    }

    .btn-return {
        background-color: #00eaff;
        color: black;
    }

</style>

</head>

<body>
<div class="container">

<div class="glass-box">

    <h2>🖼️ Decryption Result</h2>

    <img src="{{ url_for('uploaded', filename=decrypted_image) }}" alt="Decrypted Image">

    <div class="text-center">
        <a href="{{ url_for('detect') }}" class="btn-adv btn-return">
            🔙 Return to Detect
        </a>
    </div>

</div>

</div>
</body>
</html>
